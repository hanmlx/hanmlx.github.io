<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff;
            color: #000;
        }

        .container {
            text-align: center;
            max-width: 480px;
            padding: 60px 40px;
        }

        .title {
            font-size: 56px;
            font-weight: 300;
            letter-spacing: 8px;
            color: #000;
            margin-bottom: 20px;
        }

        .url-box {
            padding: 30px;
            border: 1px solid #e0e0e0;
            margin-bottom: 40px;
        }

        .url {
            font-size: 24px;
            font-weight: 500;
            color: #000;
            text-decoration: none;
            display: inline-block;
            padding-bottom: 2px;
            border-bottom: 1px solid #000;
            transition: opacity 0.2s;
        }

        .url:hover {
            opacity: 0.6;
        }

        .countdown {
            font-size: 48px;
            font-weight: 200;
            color: #000;
            margin-bottom: 10px;
        }

        .countdown-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress {
            width: 200px;
            height: 2px;
            background: #e0e0e0;
            margin: 20px auto 0;
            overflow: hidden;
        }

        .progress-bar {
            width: 100%;
            height: 100%;
            background: #000;
            animation: shrink 5s linear forwards;
        }

        @keyframes shrink {
            from { width: 100%; }
            to { width: 0%; }
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: #000;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 1px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Page Moved</div>
        <div class="url-box">
            <a href="https://hanmlx.42web.io/" class="url">hanmlx.42web.io</a>
        </div>
        <div class="countdown" id="countdown">5</div>
        <div class="countdown-label">seconds remaining</div>
        <div class="progress">
            <div class="progress-bar"></div>
        </div>
        <a href="https://hanmlx.42web.io/" class="btn">GO NOW</a>
    </div>

    <script>
        let sec = 5;
        const el = document.getElementById('countdown');
        const timer = setInterval(() => {
            sec--;
            el.textContent = sec;
            if (sec <= 0) {
                clearInterval(timer);
                window.location.href = 'https://hanmlx.42web.io/';
            }
        }, 1000);
    </script>
</body>
</html>
